apiVersion: joule.sap/v1
kind: JouleAction

metadata:
  name: CancelPickingTask
  version: 1.0.0
  description: >
    Cancels an open picking (warehouse) task for a specified handling unit
    in SAP EWM. Used as the first step of the HU remediation flow when an
    incorrect HU is found on the pallet.
    HIGH-RISK WRITE ACTION â requires explicit confirmation before execution.

api:
  ordId: sap.s4:apiResource:OP_WAREHOUSEORDER_0001:v1
  btpDestination: M20CLNT100
  authentication: oauth2-client-credentials

riskLevel: high
requiresConfirmation: true

request:
  method: POST
  path: "/WarehouseTask/{WarehouseNumber}/{WarehouseOrder}/{WarehouseTask}/SAP__self.CancelWarehouseTask"
  headers:
    Content-Type: "application/json"
  body: {}

inputs:
  - name: WarehouseNumber
    type: string
    required: true
    in: path
    description: EWM warehouse number.
  - name: WarehouseOrder
    type: string
    required: true
    in: path
    description: EWM warehouse order number containing the task to cancel.
  - name: WarehouseTask
    type: string
    required: true
    in: path
    description: EWM warehouse task number to cancel.

outputs:
  - name: cancelled
    type: boolean
    value: true
  - name: WarehouseTask
    type: string
    value: "{WarehouseTask}"
  - name: WarehouseOrder
    type: string
    value: "{WarehouseOrder}"

auditLog:
  enabled: true
  fields:
    - WarehouseNumber
    - WarehouseOrder
    - WarehouseTask
    - currentUser.id
    - timestamp

errorHandling:
  onHttpError:
    userMessage: >
      Could not cancel warehouse task {WarehouseTask}: {error.message}.
      Please escalate to your EWM administrator.
